# Supported client path: import this WireGuard profile directly.
# Do not configure a separate manual HTTP proxy on the client.
[Interface]
Address = ${CLIENT_IP}
PrivateKey = $(case "${PEER_ID}" in (*[!A-Za-z0-9_-]*|*..*|*/*|*\\*) echo "invalid PEER_ID" >&2; exit 1;; (*) cat "/config/${PEER_ID}/privatekey-${PEER_ID}";; esac)
# Use 443 only for deliberate peer-to-peer/server-style clients with privileges.
ListenPort = 51820
MTU = 1280
DNS = ${PEERDNS}

[Peer]
PublicKey = $(cat /config/server/publickey-server)
PresharedKey = $(case "${PEER_ID}" in (*[!A-Za-z0-9_-]*|*..*|*/*|*\\*) echo "invalid PEER_ID" >&2; exit 1;; (*) cat "/config/${PEER_ID}/presharedkey-${PEER_ID}";; esac)
Endpoint = ${SERVERURL}:${SERVERPORT}
AllowedIPs = ${ALLOWEDIPS}
